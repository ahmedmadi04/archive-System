<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit | Premium Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 0% 0%, #0f172a 0%, #020617 100%);
            height: 100vh;
        }
        .login-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 56px;
            border-radius: 32px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.7);
            position: relative;
            overflow: hidden;
            animation: cardFadeIn 0.8s ease-out;
        }
        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(to right, var(--primary), var(--accent));
        }
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .login-logo {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 0 30px var(--primary-glow);
            transform: rotate(-10deg);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <div class="login-logo">
                <i class="fas fa-cube" style="color: white; font-size: 32px;"></i>
            </div>
            <h1 style="font-size: 32px; font-weight: 800; letter-spacing: -0.05em; color: #fff;">Orbit VR</h1>
            <p style="color: var(--text-muted); font-size: 14px; font-weight: 500; margin-top: 8px;">Secure Infrastructure Access Portal</p>
        </div>

        <form id="loginForm">
            <div style="margin-bottom: 24px;">
                <label style="display: block; font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; letter-spacing: 0.1em;">Identity</label>
                <div style="position: relative;">
                    <i class="fas fa-fingerprint" style="position: absolute; left: 16px; top: 15px; color: var(--text-muted);"></i>
                    <input type="text" id="username" class="form-input" style="padding-left: 48px;" placeholder="Username" required>
                </div>
            </div>
            <div style="margin-bottom: 32px;">
                <label style="display: block; font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; letter-spacing: 0.1em;">Access Key</label>
                <div style="position: relative;">
                    <i class="fas fa-key" style="position: absolute; left: 16px; top: 15px; color: var(--text-muted);"></i>
                    <input type="password" id="password" class="form-input" style="padding-left: 48px;" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 16px;">
                <span id="loginText">Initialize Session</span>
                <i class="fas fa-circle-notch fa-spin" id="loginLoader" style="display: none;"></i>
            </button>
            
            <div id="errorMessage" style="display: none; margin-top: 24px; padding: 14px; border-radius: 12px; background: rgba(239, 68, 68, 0.15); color: #ef4444; font-size: 13px; text-align: center; border: 1px solid rgba(239, 68, 68, 0.2);">
                <i class="fas fa-shield-virus" style="margin-right: 8px;"></i> <span id="errorText">Access Verification Failed</span>
            </div>
        </form>

        <div style="margin-top: 40px; text-align: center;">
            <p style="font-size: 11px; color: var(--text-muted); font-weight: 600;">© 2026 ORBIT QUANTUM SYSTEMS</p>
        </div>
    </div>

    <script src="/js/script.js"></script>
</body>
</html>
